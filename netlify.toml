# Netlify configuration for DPRdata.com
# Fixes Google Search Console indexing issues:
# 1. 404 handling with custom page
# 2. www enforcement (non-www → www redirect)
# 3. .html extension removal (prevents duplicate content)

[build]
  publish = "."

# Force HTTPS and www
[[redirects]]
  from = "https://dprdata.com/*"
  to = "https://www.dprdata.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://dprdata.com/*"
  to = "https://www.dprdata.com/:splat"
  status = 301
  force = true

# Redirect .html extensions to clean URLs (prevents duplicate content / alternate canonical issues)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

