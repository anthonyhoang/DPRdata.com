<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — DPRdata.com</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F1B33;
    --red: #C62828;
    --gold: #F9A825;
    --green: #2E7D32;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--navy);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .error-code {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--red), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .error-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 12px;
    color: rgba(255,255,255,0.9);
  }
  .error-message {
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    max-width: 480px;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 30px;
  }
  .home-link {
    display: inline-block;
    padding: 12px 32px;
    background: var(--red);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  .home-link:hover {
    background: #D32F2F;
  }
  .brand {
    margin-top: 40px;
    font-size: 14px;
    font-weight: 700;
  }
  .brand .b-dpr { color: var(--gold); }
  .brand .b-data { color: var(--red); }
  .brand .b-dot { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
  <div class="error-code">404</div>
  <div class="error-title">Page Not Found</div>
  <div class="error-message">
    The page you're looking for doesn't exist or may have been moved.
    Head back to the homepage to explore the full analysis.
  </div>
  <a href="/" class="home-link">Go to Homepage</a>
  <div class="brand">
    <span class="b-dpr">DPR</span><span class="b-data">Data</span><span class="b-dot">.com</span>
  </div>
</body>
</html>
